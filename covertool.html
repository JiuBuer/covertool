<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/covertool.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preload" href="./font/SourceHanSansSC-Medium-2.otf" as="font" type="font/otf" crossorigin="anonymous">
    <link rel="preload" href="./font/CKTKingkong.ttf" as="font" type="font/ttf" crossorigin="anonymous">
    <script src="./js/covergenerator.js"></script>
</head>
<body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="index.html" class="logo">
          <i class="fas fa-star"></i> 咎不二
          <span>| 微信封面生成</span>
        </a>
      </div>
    </nav>

    <div id="editor">
        <canvas id="coverCanvas" width="1303" height="383"></canvas>
    </div>

    <div id="sidebar">
        <div class="group">
            <label>1. 素材上传</label>
            <div style="background: var(--input-bg); padding: 10px; border-radius: 4px;">
                <label style="font-weight: normal; font-size: 11px;">背景大图</label>
                <input type="file" onchange="loadImg(this, 'left')" style="font-size: 12px; margin-top:5px;">

                <label style="font-weight: normal; font-size: 11px; margin-top: 15px; display: block;">右侧小图</label>
                <input type="file" onchange="loadImg(this, 'right')" style="font-size: 12px; margin-top:5px;">
            </div>
            <label>2. 设置文字和样式/鼠标调整位置</label>
            <label>3. 下载封面到本地</label>
        </div>

        <div class="group">
            <label>主标题文字 & 样式</label>
            <input type="text" id="titleInput" placeholder="请输入标题" oninput="updateElement('title', 'text', this.value)">

            <div style="display: flex; gap: 10px;">
                <div style="flex: 2;">
                    <label style="font-weight: normal; font-size: 11px;">字体选择</label>
                    <select id="titleFontSelect" onchange="updateElement('title', 'fontFamily', this.value)"></select>
                </div>
                <div style="flex: 1;">
                    <label style="font-weight: normal; font-size: 11px;">字号: <span id="titleSizeLabel">32</span></label>
                    <input type="range" min="10" max="200" value="32" style="width:100%"
                           oninput="document.getElementById('titleSizeLabel').innerText=this.value; updateElement('title', 'fontSize', parseInt(this.value))">
                </div>
            </div>

            <div class="color-row">
                <div class="color-item">
                    <label style="font-weight: normal; font-size: 11px;">文字颜色</label>
                    <div style="display: flex; align-items: center; background: var(--input-bg); padding: 2px 5px; border-radius: 4px; border: 1px solid #444;">
                        <input type="color" id="titleColorPicker" value="#3682e0"
                               style="width: 24px; height: 24px; border: none; padding: 10; background: none; cursor: pointer;"
                               oninput="syncColor('title', 'color', this.value, 'titleColorHex')">
                        <input type="text" id="titleColorHex" value="#000000"
                               oninput="syncColor('title', 'color', this.value, 'titleColorPicker')">
                        <button onclick="pickColor('title', 'color', ['titleColorPicker', 'titleColorHex'])"
                                style="background: none; border: none; padding: 2px; cursor: pointer; display: flex; align-items: center;"
                                title="吸取屏幕颜色">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="#aaa"><path d="M17.48 8l2.53 2.53-2.53 2.53-.7-.7 1.33-1.33H13v-1h5.1l-1.32-1.33.7-.7zM7 21c-1.1 0-2-.9-2-2 0-.55.22-1.05.59-1.41l9.82-9.82 3.54 3.54-9.82 9.82c-.36.37-.86.59-1.41.59zM17.17 5L19 6.83l-1.06 1.06L16.11 6.06 17.17 5z" /></svg>
                        </button>
                    </div>
                </div>

                <div class="color-item">
                    <label style="font-weight: normal; font-size: 11px;">背景颜色</label>
                    <div style="display: flex; align-items: center; background: var(--input-bg); padding: 2px 5px; border-radius: 4px; border: 1px solid #444;">
                        <input type="color" id="titleBgColorPicker" value="#ffffff"
                               style="width: 24px; height: 24px; border: none; padding: 0; background: none; cursor: pointer;"
                               oninput="syncColor('title', 'bgColor', this.value, 'titleBgColorHex')">
                        <input type="text" id="titleBgColorHex" value="#ffffff"
                               oninput="syncColor('title', 'bgColor', this.value, 'titleBgColorPicker')">
                        <button onclick="pickColor('title', 'bgColor', ['titleBgColorPicker', 'titleBgColorHex'])"
                                style="background: none; border: none; padding: 2px; cursor: pointer; display: flex; align-items: center;"
                                title="吸取屏幕颜色">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="#aaa"><path d="M17.48 8l2.53 2.53-2.53 2.53-.7-.7 1.33-1.33H13v-1h5.1l-1.32-1.33.7-.7zM7 21c-1.1 0-2-.9-2-2 0-.55.22-1.05.59-1.41l9.82-9.82 3.54 3.54-9.82 9.82c-.36.37-.86.59-1.41.59zM17.17 5L19 6.83l-1.06 1.06L16.11 6.06 17.17 5z" /></svg>
                        </button>
                        <button onclick="syncColor('title', 'bgColor', 'transparent', 'titleBgColorHex')"
                                style="background: none; border: 1px border #666; color: #aaa; font-size: 9px; cursor: pointer; padding: 2px;"
                                title="设为透明">
                            ❌
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="group">
            <label>副标题文字 & 样式</label>
            <input type="text" id="subtitleInput" placeholder="英文逗号换行，如[小图,标题]" oninput="updateElement('subtitle', 'text', this.value.split(','))">

            <div style="display: flex; gap: 10px;">
                <div style="flex: 2;">
                    <label style="font-weight: normal; font-size: 11px;">字体选择</label>
                    <select id="subtitleFontSelect" onchange="updateElement('subtitle', 'fontFamily', this.value)"></select>
                </div>
                <div style="flex: 1;">
                    <label style="font-weight: normal; font-size: 11px;">字号: <span id="subtitleSizeLabel">120</span></label>
                    <input type="range" min="10" max="170" value="120" style="width:100%"
                           oninput="document.getElementById('subtitleSizeLabel').innerText=this.value; updateElement('subtitle', 'fontSize', parseInt(this.value))">
                </div>
            </div>

            <div class="color-row">
                <div class="color-item">
                    <label style="font-weight: normal; font-size: 11px;">文字颜色</label>
                    <div style="display: flex; align-items: center; background: var(--input-bg); padding: 2px 5px; border-radius: 4px; border: 1px solid #444;">
                        <input type="color" id="subtitleColorPicker" value="#ffffff"
                               style="width: 24px; height: 24px; border: none; padding: 0; background: none; cursor: pointer;"
                               oninput="syncColor('subtitle', 'color', this.value, 'subtitleColorHex')">
                        <input type="text" id="subtitleColorHex" value="#ffffff"
                               oninput="syncColor('subtitle', 'color', this.value, 'subtitleColorPicker')">
                        <button onclick="pickColor('subtitle', 'color', ['subtitleColorPicker', 'subtitleColorHex'])"
                                style="background: none; border: none; padding: 2px; cursor: pointer; display: flex; align-items: center;"
                                title="吸取屏幕颜色">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="#aaa"><path d="M17.48 8l2.53 2.53-2.53 2.53-.7-.7 1.33-1.33H13v-1h5.1l-1.32-1.33.7-.7zM7 21c-1.1 0-2-.9-2-2 0-.55.22-1.05.59-1.41l9.82-9.82 3.54 3.54-9.82 9.82c-.36.37-.86.59-1.41.59zM17.17 5L19 6.83l-1.06 1.06L16.11 6.06 17.17 5z" /></svg>
                        </button>
                    </div>
                </div>

                <div class="color-item">
                    <label style="font-weight: normal; font-size: 11px;">背景颜色</label>
                    <div style="display: flex; align-items: center; background: var(--input-bg); padding: 2px 5px; border-radius: 4px; border: 1px solid #444;">
                        <input type="color" id="subtitleBgColorPicker" value="#ffffff"
                               style="width: 24px; height: 24px; border: none; padding: 0; background: none; cursor: pointer;"
                               oninput="syncColor('subtitle', 'bgColor', this.value, 'subtitleBgColorHex')">
                        <input type="text" id="subtitleBgColorHex" value="#ffffff"
                               oninput="syncColor('subtitle', 'bgColor', this.value, 'subtitleBgColorPicker')">
                        <button onclick="pickColor('subtitle', 'bgColor', ['subtitleBgColorPicker', 'subtitleBgColorHex'])"
                                style="background: none; border: none; padding: 2px; cursor: pointer; display: flex; align-items: center;"
                                title="吸取屏幕颜色">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="#aaa"><path d="M17.48 8l2.53 2.53-2.53 2.53-.7-.7 1.33-1.33H13v-1h5.1l-1.32-1.33.7-.7zM7 21c-1.1 0-2-.9-2-2 0-.55.22-1.05.59-1.41l9.82-9.82 3.54 3.54-9.82 9.82c-.36.37-.86.59-1.41.59zM17.17 5L19 6.83l-1.06 1.06L16.11 6.06 17.17 5z" /></svg>
                        </button>
                        <button onclick="syncColor('subtitle', 'bgColor', 'transparent', 'subtitleBgColorHex')"
                                style="background: none; border: 1px border #666; color: #aaa; font-size: 9px; cursor: pointer; padding: 2px;"
                                title="设为透明">
                            ❌
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="group" style="justify-content: flex-end; height: 100%; padding-bottom: 5px;">
            <button onclick="sendToWPF()" style="margin-bottom: 10px;">下载封面到本地</button>
            <button onclick="uiReset()">恢复默认样式和位置</button>
        </div>
    </div>
    <footer class="footer">
      <div class="footer-content">
        <div class="footer-bottom">
          <p>Copyright © 2026 咎不二 | 保留所有权利</p>
      
          <div class="social-links">
            <a href="https://github.com/JiuBuer" target="_blank" rel="nofollow" class="social-link">
              <i class="fab fa-github"></i>
            </a>
            <a href="contact.html" class="social-link">
              <i class="fab fa-weixin"></i>
            </a>
            <a href="contact.html" class="social-link">
              <i class="fas fa-envelope"></i>
            </a>
          </div>
        </div>
      </div>
    </footer>

    <script>
    window.addEventListener('DOMContentLoaded', () => initCoverTool());
    </script>

</body>
</html>
